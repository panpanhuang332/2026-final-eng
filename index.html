<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>實用英文互動教室｜Lesson 4 接待外賓 · Lesson 5 與客戶會面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EAEEF3;--paper-2:#F4F7FB;--card:#FFFFFF;
  --ink:#141A22;--ink-soft:#5A6675;--line:#D6DEE8;
  --clay:#FF5A3C;            /* persimmon — warm signal accent */
  --teal:#0E9C84;--teal-deep:#0A6E5C;
  --amber:#F2B600;--amber-note:#FFE57A;--amber-line:#E9C44A;
  --green:#0E9C6E;--red:#E23D2E;
  --accent:#2C54E8;--accent-deep:#1A3CB8;     /* set per lesson */
  --display:"Space Grotesk","Noto Sans TC",system-ui,sans-serif;
  --body:"Inter","Noto Sans TC",system-ui,sans-serif;
  --mono:"Space Mono","JetBrains Mono",monospace;
  --shadow:0 4px 0 rgba(20,26,34,.13);--shadow-sm:0 2px 0 rgba(20,26,34,.11);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:17px;-webkit-text-size-adjust:100%}
body{font-family:var(--body);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased;
  background:
    radial-gradient(60% 50% at 8% 0%, color-mix(in srgb,var(--accent) 12%, transparent), transparent 70%),
    radial-gradient(55% 45% at 100% 100%, rgba(255,90,60,.08), transparent 70%),
    var(--paper);
  background-attachment:fixed;}
body::before{content:"";position:fixed;top:0;left:0;right:0;height:6px;z-index:60;
  background:linear-gradient(90deg,var(--accent) 0%,var(--accent) 55%,var(--clay) 55%,var(--clay) 78%,var(--amber) 78%);}
.zh{font-family:"Noto Sans TC",sans-serif}
.kk{font-family:var(--mono);color:var(--accent-deep);font-size:.8em;letter-spacing:-.02em}
.en{font-family:var(--body)}
.wrap{max-width:1080px;margin:0 auto;padding:0 18px 96px}

/* lesson switch */
.lesson-switch{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:30px 16px 6px}
.ls-btn{font-family:var(--display);font-weight:600;font-size:16px;cursor:pointer;border:2.5px solid var(--ink);
  background:#fff;color:var(--ink);padding:11px 24px;border-radius:13px;transition:.14s;display:flex;flex-direction:column;align-items:center;line-height:1.12;box-shadow:var(--shadow-sm)}
.ls-btn small{font-family:var(--body);font-weight:600;font-size:11.5px;letter-spacing:.02em;opacity:.65;margin-top:3px}
.ls-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.ls-btn.active{color:#fff;border-color:var(--ink)}
.ls-btn.l4.active{background:#2C54E8}
.ls-btn.l5.active{background:#0E9C84}
.ls-btn.final.active{background:#6A3FD6}

/* header / hero */
header.lesson-head{padding:24px 16px 10px;text-align:center;position:relative}
.kicker{font-family:var(--mono);font-size:12.5px;letter-spacing:.32em;color:var(--clay);font-weight:700;text-transform:uppercase}
h1.title{font-family:var(--display);font-weight:700;font-size:clamp(38px,7.4vw,70px);line-height:1.02;margin:10px 0 6px;color:var(--ink);letter-spacing:-.02em}
h1.title .lno{display:block;width:fit-content;margin:0 auto 14px;font-family:var(--mono);font-size:.24em;letter-spacing:.16em;color:#fff;background:var(--accent);font-weight:700;padding:5px 13px;border-radius:8px;text-transform:uppercase}
.subtitle{font-size:16.5px;color:var(--ink-soft);font-weight:500}
.lesson-head::after{content:"· · · · · · · · · · · · · · · · · · · ·";display:block;color:var(--line);letter-spacing:6px;font-size:14px;margin:18px auto 0;overflow:hidden;max-width:340px;height:18px;font-weight:700}

/* tabs */
.tabs{position:sticky;top:6px;z-index:30;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  padding:12px;margin:8px auto 6px;max-width:1080px;background:rgba(234,238,243,.9);backdrop-filter:blur(10px);border-bottom:2.5px solid var(--ink)}
.tab{font-family:var(--display);font-size:15px;font-weight:600;cursor:pointer;border:2px solid var(--ink);
  background:#fff;color:var(--ink);padding:8px 16px;border-radius:10px;transition:.14s;white-space:nowrap;box-shadow:var(--shadow-sm)}
.tab:hover{transform:translateY(-1px)}
.tab.active{background:var(--ink);color:#fff}

.panel{display:none;animation:fade .32s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* section header — block numeral signature */
.sec-head{display:flex;align-items:center;gap:14px;margin:40px 0 18px}
.sec-no{font-family:var(--display);font-weight:700;font-size:21px;color:#fff;background:var(--accent);
  width:48px;height:48px;min-width:48px;display:flex;align-items:center;justify-content:center;border-radius:13px;box-shadow:var(--shadow-sm)}
.sec-head h2{font-family:var(--display);font-weight:700;font-size:28px;color:var(--ink);letter-spacing:-.01em}
.sec-head .en-h{font-family:var(--mono);font-size:13px;color:var(--ink-soft);font-weight:400;letter-spacing:.02em;text-transform:uppercase}

.card{background:var(--card);border:2.5px solid var(--ink);border-radius:18px;padding:26px 28px;margin:18px 0;box-shadow:var(--shadow)}
.card.soft{border-width:2px;border-color:var(--line);box-shadow:var(--shadow-sm);padding:22px 24px}
.card h3{font-family:var(--display)!important;font-weight:600;font-size:22px!important}
.track-tag{display:inline-block;font-family:var(--mono);font-size:11.5px;font-weight:700;background:var(--ink);color:#fff;padding:3px 11px;border-radius:7px;letter-spacing:.06em;margin-bottom:7px}

.lead{font-size:18.5px;color:var(--ink-soft);margin:8px 0 20px;line-height:1.7;max-width:64ch}
.goal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(212px,1fr));gap:14px;margin:18px 0}
.goal{background:#fff;border:2.5px solid var(--ink);border-top-width:8px;border-top-color:var(--accent);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-sm);transition:.14s;cursor:pointer;position:relative}
.goal:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.go-arrow{position:absolute;top:13px;right:15px;font-family:var(--display);font-weight:700;color:var(--accent);font-size:19px;opacity:.5;transition:.14s}
.goal:hover .go-arrow{opacity:1;transform:translateX(3px)}
.goal h4{font-family:var(--display);font-size:16.5px;color:var(--ink);margin-bottom:7px;font-weight:600}
.goal p{font-size:14.5px;color:var(--ink-soft);line-height:1.55}
.warm{background:var(--amber-note);border:2.5px solid var(--ink);border-radius:14px;padding:22px 26px;margin-top:18px;box-shadow:var(--shadow)}
.warm h4{font-family:var(--display);font-size:17px;margin-bottom:10px;color:var(--ink);font-weight:600}
.warm ol{margin-left:20px;font-size:16px}.warm li{margin:6px 0}

/* dialogue */
.dlg-line{display:flex;gap:13px;margin:0 0 14px;align-items:flex-start}
.who{flex:0 0 38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:700;font-size:15px;color:#fff;background:var(--accent);margin-top:1px}
.who.guest{background:var(--clay)}
.bubble{flex:1}.bubble .ln{font-size:17px;line-height:1.62}.bubble .tr{font-size:14.5px;color:var(--ink-soft);margin-top:3px}
.hide-zh .tr{display:none}
.blankans{display:inline-block;background:var(--amber-note);border-bottom:3px solid var(--amber);font-weight:700;padding:0 7px;border-radius:5px;color:#8a5e00}
.vk{font-weight:700;color:var(--accent-deep);border-bottom:2px dotted var(--clay);cursor:help}
.opt-key{background:var(--paper-2);border:2px solid var(--line);border-radius:13px;padding:14px 17px;margin:12px 0 16px;font-size:14.5px}
.opt-key b{color:var(--accent-deep)}
.ans-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}
.ans-chip{background:var(--ink);color:#fff;font-weight:700;font-size:14px;padding:5px 12px;border-radius:8px;font-family:var(--mono)}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin:8px 0 0}
.btn{font-family:var(--display);font-weight:600;font-size:14px;cursor:pointer;border:2.5px solid var(--ink);background:var(--accent);color:#fff;padding:9px 17px;border-radius:11px;transition:.12s;box-shadow:var(--shadow-sm)}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.btn:active{transform:translate(0,2px);box-shadow:none}
.btn.ghost{background:#fff;color:var(--ink)}
.btn.sm{padding:6px 12px;font-size:13px;border-radius:9px}
.spk{cursor:pointer;border:none;background:none;font-size:15px;padding:2px 4px;vertical-align:middle;opacity:.65}.spk:hover{opacity:1}

/* grammar */
.gtable{width:100%;border-collapse:separate;border-spacing:0;margin:10px 0;font-size:15.5px;border:2px solid var(--ink);border-radius:12px;overflow:hidden}
.gtable th,.gtable td{border-bottom:1.5px solid var(--line);padding:12px 14px;text-align:left;vertical-align:top}
.gtable tr:last-child th,.gtable tr:last-child td{border-bottom:none}
.gtable th{background:var(--accent);color:#fff;font-weight:700;width:32%;font-family:var(--display)}
.gtable td .zh{display:block;color:var(--ink-soft);font-size:13px;margin-top:3px}.gtable b{color:var(--clay)}
.note-line{font-size:14.5px;color:var(--ink-soft);margin:12px 0 6px;font-style:italic}
.grp-h{font-family:var(--display);font-weight:700;font-size:21px;color:var(--accent-deep);margin:26px 0 12px;padding-bottom:7px;border-bottom:3px solid var(--accent)}
.gp{background:#fff;border:2px solid var(--line);border-left:6px solid var(--accent);border-radius:0 12px 12px 0;padding:15px 18px;margin:11px 0;box-shadow:var(--shadow-sm)}
.gp-t{font-family:var(--display);font-weight:600;font-size:16.5px;color:var(--ink);margin-bottom:5px}
.gp-b{font-size:15px;color:var(--ink-soft)}.gp-b b{color:var(--clay)}

/* word bank */
.wb{background:var(--amber-note);border:2.5px solid var(--ink);border-radius:16px;padding:10px 12px;margin-bottom:18px;box-shadow:var(--shadow)}
.wb-title{font-family:var(--display);font-weight:700;color:var(--ink);font-size:20px;padding:10px 8px 6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;padding:8px}
.vcard{background:#fff;border:2px solid var(--ink);border-radius:12px;padding:13px 15px}
.vtop{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
.vword{font-family:var(--display);font-weight:700;font-size:17.5px;color:var(--accent-deep)}
.vpos{font-size:13px;color:var(--clay);font-weight:600}
.vstar{color:var(--red);font-size:13px}
.vzh{font-size:15.5px;font-weight:600;margin:3px 0 5px}
.vex{font-size:13.8px;color:var(--ink-soft);line-height:1.5}
.hide-zh .vzh{filter:blur(5px);transition:.2s}.hide-zh .vzh:hover{filter:none}

/* english corner */
.ptable{width:100%;border-collapse:separate;border-spacing:0;font-size:15px;margin-top:8px;border:2px solid var(--ink);border-radius:12px;overflow:hidden}
.ptable th,.ptable td{border-bottom:1.5px solid var(--line);padding:12px 14px;text-align:left;vertical-align:top}
.ptable tr:last-child td{border-bottom:none}
.ptable th{background:var(--clay);color:#fff;font-family:var(--display)}
.ptable td:first-child{font-family:var(--display);font-weight:700;color:var(--clay);white-space:nowrap}
.ptable td:nth-child(2){color:var(--ink-soft);font-size:13px}
.qbox{background:var(--paper-2);border:2px solid var(--line);border-radius:13px;padding:14px 16px;margin:11px 0}
.qbox .q{font-weight:700;font-size:15.5px}.qbox .modela{font-size:14px;color:var(--green);margin-top:5px;display:none}
.qbox.show .modela{display:block}
.chart{width:100%;border-collapse:separate;border-spacing:0;font-size:14.5px;margin-top:8px;border:2px solid var(--ink);border-radius:12px;overflow:hidden}
.chart th,.chart td{border-bottom:1.5px solid var(--line);padding:10px 12px;text-align:left}
.chart tr:last-child th,.chart tr:last-child td{border-bottom:none}
.chart th{background:var(--accent);color:#fff;font-family:var(--display)}.chart td:first-child{font-weight:700;background:var(--paper-2)}
.rp-line{display:flex;gap:10px;margin:9px 0;font-size:15.5px}
.rp-who{font-family:var(--display);font-weight:700;color:var(--accent-deep);flex:0 0 26px}.rp-cue{color:var(--ink-soft);font-style:italic}

/* key points */
.kp{border:2px solid var(--line);border-left:8px solid;border-radius:0 14px 14px 0;background:#fff;padding:16px 19px;margin:13px 0;box-shadow:var(--shadow-sm)}
.kp.t3{border-left-color:var(--red)}.kp.t2{border-left-color:var(--amber)}.kp.t1{border-left-color:var(--teal)}
.kp .tier{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.kp.t3 .tier{color:var(--red)}.kp.t2 .tier{color:#b58600}.kp.t1 .tier{color:var(--teal-deep)}
.kp h4{font-family:var(--display);font-size:17px;margin:4px 0 6px;color:var(--ink);font-weight:600}
.kp p,.kp ul{font-size:15px;color:var(--ink-soft)}.kp ul{margin-left:18px}
.kp code{background:var(--paper-2);border:1.5px solid var(--line);border-radius:6px;padding:1px 7px;font-family:var(--mono);font-size:13px;color:var(--accent-deep)}

/* quiz */
.quiz-entry{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}
.entry{border:2.5px solid var(--ink);border-radius:18px;padding:28px 26px;cursor:pointer;background:var(--card);box-shadow:var(--shadow);transition:.15s;text-align:center}
.entry:hover{transform:translateY(-4px);box-shadow:0 10px 0 -2px rgba(20,26,34,.18)}
.entry.exam{background:var(--accent);color:#fff;border-color:var(--ink)}
.entry .ico{font-size:36px}.entry h3{font-family:var(--display);font-weight:700;font-size:24px;margin:8px 0 5px}
.entry p{font-size:14.5px;color:var(--ink-soft);line-height:1.6}.entry.exam p{color:rgba(255,255,255,.9)}
.entry .meta{font-family:var(--mono);font-size:12.5px;margin-top:12px;font-weight:700;color:var(--clay)}.entry.exam .meta{color:var(--amber-note)}
.quiz-stage{display:none;margin-top:16px}.quiz-stage.active{display:block}
.qbar{position:sticky;top:62px;z-index:20;display:flex;justify-content:space-between;align-items:center;background:#fff;border:2.5px solid var(--ink);border-radius:13px;padding:11px 17px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.qbar .prog{font-family:var(--display);font-weight:600;font-size:15px}
.timer{font-family:var(--mono);font-weight:700;font-size:20px;color:var(--accent-deep)}
.timer.warn{color:var(--red);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.35}}
.qitem{background:#fff;border:2px solid var(--line);border-radius:14px;padding:19px 21px;margin:14px 0;box-shadow:var(--shadow-sm)}
.qtype{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#fff;padding:3px 10px;border-radius:7px;margin-bottom:9px;background:var(--clay)}
.qtype.agree,.qtype.number{background:#6A3FD6}.qtype.vocab{background:#2C54E8}.qtype.phrase{background:var(--clay)}
.qtype.problem{background:#C9462C}.qtype.reading{background:#0E9C6E}.qtype.grammar{background:#1488B0}.qtype.tense{background:#C98A12}
.lesson-badge{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:6px;vertical-align:middle;color:#fff}
.lesson-badge.L4{background:#2C54E8}.lesson-badge.L5{background:#0E9C84}
.qtext{font-weight:600;font-size:16.5px;margin-bottom:11px;line-height:1.5}.qtext .en{font-family:var(--body)}
.qtext blockquote{font-weight:400;font-style:normal;background:var(--paper-2);border-left:5px solid var(--accent);padding:11px 15px;margin:0 0 10px;border-radius:0 10px 10px 0;font-size:15px;color:var(--ink)}
.opt{display:block;width:100%;text-align:left;border:2px solid var(--line);background:#fff;border-radius:11px;padding:12px 16px;margin:8px 0;font-size:15.5px;cursor:pointer;font-family:inherit;transition:.12s}
.opt:hover{border-color:var(--accent)}.opt.sel{border-color:var(--ink);background:var(--paper-2)}
.opt.correct{border-color:var(--green);background:#e3f6ec}.opt.wrong{border-color:var(--red);background:#fbe7e4}
.opt .lab{font-family:var(--display);font-weight:700;margin-right:9px;color:var(--clay)}
.explain{font-size:14.5px;background:var(--paper-2);border-radius:10px;padding:11px 14px;margin-top:10px;display:none}
.explain.show{display:block}.explain b,.explain strong{color:var(--green)}
.result{text-align:center;padding:32px 22px;border:2.5px solid var(--ink);border-radius:18px;background:#fff;box-shadow:var(--shadow);margin-top:10px}
.result .score{font-family:var(--display);font-weight:700;font-size:60px;color:var(--accent-deep);line-height:1}
.result .grade{font-family:var(--display);font-size:21px;font-weight:700;margin:8px 0}.result .cmt{color:var(--ink-soft);font-size:15px}
footer{text-align:center;font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);padding:44px 16px 16px;letter-spacing:.02em}
@media (max-width:600px){
  html{font-size:16px}
  .wrap{padding:0 14px 80px}
  h1.title{font-size:clamp(30px,9vw,42px)}
  .ls-btn{font-size:14.5px;padding:9px 16px}
  .tab{font-size:13.5px;padding:7px 12px}
  .lead{font-size:16.5px}
  .sec-head h2{font-size:23px}.sec-no{width:40px;height:40px;min-width:40px;font-size:18px}
  .vgrid,.goal-grid,.quiz-entry{grid-template-columns:1fr!important}
  .card{padding:20px 18px}.bubble .ln{font-size:16px}
  .qbar{top:56px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:3px solid var(--clay);outline-offset:2px}
</style>
</head>
<body>

<div class="lesson-switch">
  <button class="ls-btn l4 active" data-lesson="l4">Lesson 4<small>接待外賓</small></button>
  <button class="ls-btn l5" data-lesson="l5">Lesson 5<small>與客戶會面</small></button>
  <button class="ls-btn final" data-lesson="final">期末考模擬<small>Final Exam</small></button>
</div>
<header class="lesson-head" id="lessonHead"></header>
<nav class="tabs" id="tabs"></nav>
<div class="wrap"><div id="panels"></div></div>

<script>

errible at + N／V-ing（在……方面很差）", "I'm **terrible at** math.｜ 反義：be good at（擅長）"], ["4. one of + 複數名詞", "**one of my favorite restaurants**（不能用 restaurant 單數）"], ["5. sound like + N / sound + adj.", "That **sounds like fun**.（fun 是名詞）｜ That **sounds good**.（good 是形容詞）"], ["6. CEO / CFO / COO / VP / PM 職稱縮寫", "Chief **E**xecutive Officer = 執行長｜ Chief **F**inancial Officer = 財務長｜ Chief **O**perating Officer = 營運長｜ **V**ice **P**resident = 副總裁｜ **P**roject **M**anager = 專案經理 **📌 Part C 必考重點：**｜ ① **look forward to + V-ing**（to 是介系詞！）｜ ② **be in charge of**（負責……）｜ ③ **CEO / CFO / COO / VP / PM** 五大職稱縮寫（商業英文必背）｜ ④ **would rather . . . than . . .**（寧可……也不願……）"]], "D": [["1. ⭐⭐⭐ either 的三種用法", "① **代名詞**：兩者中任一個｜ Either is fine with me. ｜ ② **連接詞**：either A or B（A 或 B）｜ We have to choose either this one or that one. ｜ ③ **副詞**：用於否定句句尾，意為「也」｜ I don't know, either. （注意：肯定句的「也」用 too / also）"], ["2. ⭐⭐⭐ prefer 的三種用法", "① **prefer A or B**（選 A 還是 B？）｜ Do you prefer chicken or beef? ｜ ② **prefer to + V**（比較喜歡做……）｜ I prefer to eat out. ｜ ③ **prefer A to B**（喜歡 A 勝過 B）⭐ 注意：用 to，不是 than！｜ Darren prefers French food **to** Chinese food."], ["3. ⭐⭐ something + 形容詞（形容詞後置）", "I'll get you **something delicious**.（不能說 delicious something）｜ 規則：something / anything / nothing / everything 後面的形容詞要**放在後面**。"], ["4. 現在完成式 Have you ever + p.p. + before?", "**Have you ever had** this food before?｜ 肯定答：Yes, I have. ／ 否定答：No, I haven't."], ["5. be allowed to + V（被允許）", "You **are allowed to bargain** for the items."], ["6. though 句尾用法（不過、然而）", "I'm not good at bargaining **though**.（= but / however） **📌 Part D 必考重點：**｜ ① **either** 三種用法（代名詞 / 連接詞 / 否定句副詞）｜ ② **prefer** 三種用法（特別注意 prefer A **to** B，不是 than）｜ ③ **something + 形容詞**（形容詞後置）｜ ④ **Have you ever + p.p.** → No, I haven't.｜ ⑤ **feel like + V-ing**（不接不定詞）"]]};

  {id:5,type:"vocab",stem:"At the night market, you can usually ___ with the seller to get a better price.",options:["bargain","borrow","bring","bother"],answer:0,
   explain:"<strong>bargain（議價）</strong>：[ˈbɑrɡɪn]，動詞，討價還價。句意：在夜市，你通常可以跟賣家議價以拿到更好的價錢。borrow（借入）、bring（帶來）、bother（打擾）都是 b 開頭的陷阱字。",
   source:"Part D（Word Bank ⁵）"},
  {id:6,type:"vocab",stem:"Ms. Lee is the manager's ___. She answers his phone calls and arranges his meetings.",options:["president","secretary","customer","trainer"],answer:1,
   explain:"<strong>secretary（秘書）</strong>：[ˈsɛkrəˌtɛrɪ]，協助主管的人。從句子描述（接電話、安排會議）可判斷是秘書。拼字小提示：secret（秘密）+ ary = secretary。",
   source:"Part C（Word Bank ¹）"},
  {id:7,type:"vocab",stem:"The hotel has 20 floors, so we'd better take the ___ instead of the stairs.",options:["escalator","elevator","entrance","exit"],answer:1,
   explain:"<strong>elevator（電梯）</strong>：[ˈɛləˌvetɚ]，美式英文；英式用 lift。escalator（手扶梯）是陷阱選項，兩者不同。stair（樓梯）為反義字。",
   source:"Part B（Word Bank ⁴）"},
  {id:8,type:"vocab",stem:"When you arrive at the hotel, please go to the front desk and talk to the ___.",options:["customer","receptionist","president","trainer"],answer:1,
   explain:"<strong>receptionist（接待員；櫃台人員）</strong>：[rɪˈsɛpʃənɪst]，在飯店、公司門口接待客人的人。來自 receive（接待）+ -ionist（職業字尾）。",
   source:"Part B（人物代號 R）"},
  {id:9,type:"vocab",stem:"This curry is too ___ for me. I need a glass of water!",options:["sweet","salty","spicy","sour"],answer:2,
   explain:"<strong>spicy（辛辣的）</strong>：[ˈspaɪsɪ]，形容食物辣。從上下文「need water」可判斷是「辣」。sweet（甜）、salty（鹹）、sour（酸）是其他味道。",
   source:"Part D（Word Bank ³）"},
  {id:10,type:"vocab",stem:"My grandma's cookies are really ___! Everyone loves them.",options:["terrible","expensive","delicious","cheap"],answer:2,
   explain:"<strong>delicious（美味的）</strong>：[dɪˈlɪʃəs]，形容食物好吃。從「Everyone loves them」可判斷是正面評價。",
   source:"Part D（Word Bank ²）"},
  {id:11,type:"vocab",stem:"On the airplane, I'd prefer a seat by the window rather than one on the ___.",options:["aisle","island","air","aim"],answer:0,
   explain:"⭐ <strong>老師強調點</strong>：aisle（走道）[aɪl]，<strong>「s」不發音</strong>！冠詞用 an aisle seat（因 a- 是母音開頭發音）。island（島嶼）拼字相像但意思不同。",
   source:"Part A（Useful Expressions）"},
  {id:12,type:"vocab",stem:"There is an extra ___ of NT$200 for using the parking lot.",options:["change","charge","chance","choice"],answer:1,
   explain:"<strong>charge（費用；收費）</strong>：[tʃɑrdʒ]，名詞，指要付的款項。change（找零／改變）、chance（機會）、choice（選擇）都是拼字相近的陷阱字。",
   source:"Part B（Word Bank ³）"},
  {id:13,type:"vocab",stem:"She studied ___ in college because she likes working with numbers.",options:["accountant","account","accounting","counting"],answer:2,
   explain:"<strong>accounting（會計，學科）</strong>：[əˈkaʊntɪŋ]，不可數名詞。accountant（會計師，<strong>人</strong>）、account（帳戶）是相關但不同的字。主修「學科」用 accounting。",
   source:"Part C（Word Bank ³）"},
  {id:14,type:"vocab",stem:"On sunny days, I like to do ___ activities like hiking and cycling.",options:["indoor","outdoor","inside","outside"],answer:1,
   explain:"<strong>outdoor（戶外的）</strong>：形容詞，修飾 activities。indoor（室內的）是反義字。注意陷阱：inside / outside 是副詞或名詞，<strong>不是形容詞</strong>，不適合修飾名詞。",
   source:"Part D（Word Bank ⁴）"},
  {id:15,type:"vocab",stem:"You can't enter the office without your employee ___.",options:["badge","bag","budget","bridge"],answer:0,
   explain:"⭐ <strong>老師補充字</strong>：badge（識別證；徽章）[bædʒ]，公司員工配戴的身分證明。這是老師在第 6 張課本上手寫補充的字。類似職場字：ID（身分證）、name tag（名牌）。",
   source:"Part B 老師補充字 ⭐"},

  // ===== 片語題 16-25 =====
  {id:16,type:"phrase",stem:"My father will ___ me ___ at the train station tonight.",options:["pick / out","pick / up","pick / on","pick / in"],answer:1,
   explain:"<strong>pick sb up（接某人）</strong>：去某地把人接過來。受詞是代名詞 (me) 時必須放中間。pick on（找麻煩）、pick out（挑選）意思都不同。",
   source:"Part A（片語 ◆）"},
  {id:17,type:"phrase",stem:"We need to ___ at the airport two hours before the flight.",options:["check out","check on","check up","check in"],answer:3,
   explain:"<strong>check in（辦理報到／入住）</strong>：機場登機報到、飯店辦理入住都可以用。反義：check out（退房／結帳離開）。老師補充：check in 也可用於圖書館借還書。",
   source:"Part B（片語 ◆）"},
  {id:18,type:"phrase",stem:"This box is too heavy. Can you ___?",options:["give me a hand","give a hand me","take me a hand","make me a hand"],answer:0,
   explain:"<strong>give sb a hand（幫某人一把）</strong>= help sb。結構固定：give + 人 + a hand，順序不能變。take a hand、make a hand 都不是英文用法。",
   source:"Part A（片語 ◆）"},
  {id:19,type:"phrase",stem:"When new students come to our school, I always ___ them ___ the campus.",options:["show / out","show / off","show / around","show / up"],answer:2,
   explain:"<strong>show sb around（地點）</strong>：帶某人參觀。show off（炫耀）、show up（出現）、show out（送客）意思都不同。",
   source:"Part C（片語 ◆）"},
  {id:20,type:"phrase",stem:"I'm really looking forward to ___ you next week.",options:["see","saw","seeing","to see"],answer:2,
   explain:"⭐⭐⭐ <strong>必考點</strong>：look forward to + V-ing（期待……）。📌 關鍵：to 是<strong>介系詞</strong>，不是不定詞，後面接動名詞！❌ to see ⭕ to seeing",
   source:"Part C（必考句型）"},
  {id:21,type:"phrase",stem:"Would you mind ___ the window? It's very cold in here.",options:["close","to close","closing","closed"],answer:2,
   explain:"⭐⭐⭐ <strong>老師圈起來強調的必考點</strong>：mind + V-ing（介意做某事）。mind 後面<strong>只能接動名詞</strong>！❌ to close ⭕ closing。回答：不介意 → No, not at all.",
   source:"Part A Sequencing 練習（老師圈起強調）"},
  {id:22,type:"phrase",stem:"Before the test, the teacher will ___ the important points with us.",options:["go up","go over","go out","go down"],answer:1,
   explain:"<strong>go over（仔細檢視；複習；說明）</strong>：常用於複習、檢視文件。go up（上升）、go out（外出）、go down（下降）意思不同。",
   source:"Part C（片語 ◆）"},
  {id:23,type:"phrase",stem:"This new restaurant looks great. Let's ___ next weekend!",options:["try it out","try it on","try it in","try it over"],answer:0,
   explain:"<strong>try out（試試看；試用）</strong>：用於試新東西、新地方。try on（試穿衣服）容易混淆，但 try on 專用在衣服。",
   source:"Part C（片語 ◆）"},
  {id:24,type:"phrase",stem:"Oh, ___, I forgot to tell you—the meeting is moved to Friday.",options:["on the way","in the way","by the way","at the way"],answer:2,
   explain:"<strong>by the way（順帶一提）</strong>：用來轉換話題。on the way（在路上）、in the way（擋路）是不同片語。簡寫為 BTW。",
   source:"Part D（片語 ◆）"},
  {id:25,type:"phrase",stem:"Workers in our company need to ___ before 9 a.m. every day.",options:["punch out","punch on","punch off","punch in"],answer:3,
   explain:"⭐ <strong>老師補充片語</strong>：punch in（上班打卡）／ punch out（下班打卡）。老師在課本第 6 張手寫補充：「punch in/out → 打卡」。",
   source:"Part B 老師補充片語 ⭐"},

  // ===== 文意理解題 26-35 =====
  {id:26,type:"reading",stem:"<blockquote>Alex is waiting at the airport. He is holding a sign with the name \"Linda Chen\" on it. When a woman with a suitcase walks out, he goes up to her and says, \"Excuse me, are you Linda?\"</blockquote>What is Alex doing at the airport?",
   options:["He is leaving for a trip.","He is picking up a visitor.","He is checking in for a flight.","He is buying a ticket."],answer:1,
   explain:"從「holding a sign with a name on it（拿著寫有名字的牌子）」和「Are you Linda?」可判斷 Alex 在<strong>接機</strong>。pick up a visitor（接訪客）是 Part A 的核心情境。他自己沒有要出發旅行，也沒有要報到。",
   source:"Part A（機場接機情境）"},
  {id:27,type:"reading",stem:"<blockquote>Mark just got off a 14-hour flight. The food on the plane wasn't very good, so he is hungry. He is also very tired because he didn't sleep well during the flight.</blockquote>How does Mark probably feel right now?",
   options:["Excited and full of energy","Hungry and tired","Happy and relaxed","Bored and sleepy only"],answer:1,
   explain:"短文重點：「he is hungry」（飢餓）和「very tired」（疲累）。從「didn't sleep well」可知他累，從「food wasn't very good」可知他餓。D 只提到 sleepy，沒提到飢餓，不完整。",
   source:"Part A（飛行旅程描述）"},
  {id:28,type:"reading",stem:"<blockquote>Mr. Wang arrives at Sunshine Hotel at 3 p.m. He goes to the front desk and shows his passport. The receptionist gives him a key card and tells him his room is on the 8th floor.</blockquote>What is Mr. Wang doing?",
   options:["He is leaving the hotel.","He is checking in at the hotel.","He is paying for dinner.","He is looking for a friend."],answer:1,
   explain:"從「shows his passport」（出示護照）、「gives him a key card」（拿到房卡）可判斷他正在<strong>辦理入住 (check in)</strong>。入住流程：到櫃台 → 出示護照 → 拿房卡。",
   source:"Part B（飯店入住情境）"},
  {id:29,type:"reading",stem:"<blockquote>Emily is at a business hotel. The receptionist asks how she will pay for the room. Emily says, \"All the charges should go on my company credit card.\" She then hands the card to the receptionist.</blockquote>Who will pay for Emily's hotel stay?",
   options:["Emily herself, with her own money.","Emily's family.","Emily's company.","The receptionist."],answer:2,
   explain:"關鍵：「<strong>company</strong> credit card」（公司信用卡）。「charges go on my company credit card」表示帳款記在公司卡上，所以是<strong>公司付錢</strong>。陷阱：雖然 Emily 拿出卡，但是公司的卡。",
   source:"Part B（付款方式）"},
  {id:30,type:"reading",stem:"<blockquote>\"Hi, this is Megan. She's Mr. Lin's secretary. When you call the CEO's office, you'll talk to her first,\" said David, introducing the new client to his coworker.</blockquote>What is Megan's job?",
   options:["She is the CEO.","She is a new client.","She is the CEO's secretary.","She is a customer."],answer:2,
   explain:"短文中明確說「She's Mr. Lin's secretary」，且「When you call the CEO's office, you'll talk to her first」表示她是 CEO（Mr. Lin）的秘書。",
   source:"Part C（公司參訪情境）"},
  {id:31,type:"reading",stem:"<blockquote>\"And this is Henry. He's in charge of marketing. He'll show you the new ad campaign this afternoon,\" said the manager.</blockquote>What does Henry do?",
   options:["He works in accounting.","He works in marketing.","He is the manager's secretary.","He is a customer."],answer:1,
   explain:"從「He's in charge of marketing」可知 Henry 負責<strong>行銷部門</strong>。<strong>be in charge of（負責……）</strong>是 Part C 的重要片語。accounting（會計）不是 Henry 的部門。",
   source:"Part C（in charge of 句型）"},
  {id:32,type:"reading",stem:"<blockquote>Sarah is visiting Taiwan for the first time. Her host asks, \"Is there anything in particular you want to do?\" Sarah replies, \"I'd like to buy some gifts for my friends back home.\"</blockquote>What does Sarah want to do?",
   options:["Go sightseeing in the city.","Try local food.","Buy souvenirs for her friends.","Visit her host's company."],answer:2,
   explain:"從「buy some gifts for my friends」可判斷她想要買禮物 = souvenirs（紀念品）。雖然短文中沒有直接用 souvenir 這個字，但「gifts for friends back home」就是紀念品的概念。",
   source:"Part D（紀念品情境）"},
  {id:33,type:"reading",stem:"<blockquote>\"I want to make this lunch worth your while,\" said John to his guest. \"Is there anything you don't like to eat?\" The guest replied, \"I don't like very spicy food.\"</blockquote>What is John planning to do?",
   options:["Take his guest sightseeing.","Treat his guest to a nice lunch.","Help his guest check in at the hotel.","Drive his guest to the airport."],answer:1,
   explain:"<strong>worth your while（值得；物超所值）</strong>= 要讓你覺得這頓飯很值得。從「make this lunch worth your while」+「anything you don't like to eat?」可判斷他要<strong>請客吃飯</strong>。treat sb to + N = 請某人吃……",
   source:"Part D（餐廳款待情境）"},
  {id:34,type:"reading",stem:"<blockquote>\"By the way, you are allowed to bargain at this market. No one ever pays the first price the seller says,\" Tom told his foreign friend.</blockquote>What is Tom telling his friend?",
   options:["The market is closed today.","The prices are fixed.","She can negotiate the price.","She must pay in cash."],answer:2,
   explain:"<strong>bargain（議價）</strong>= <strong>negotiate the price</strong>（談價錢）。「No one pays the first price」意思是「沒人會直接付第一個開價」，所以可以議價。",
   source:"Part D（市場議價情境）"},
  {id:35,type:"reading",stem:"<blockquote>Customer: \"I prefer a window seat, please.\"<br>Agent: \"I'm sorry, all window seats in economy class are taken. Would you like a seat on the aisle?\"<br>Customer: \"OK, that's fine.\"</blockquote>What kind of seat did the customer finally get?",
   options:["A window seat in economy class","A window seat in business class","An aisle seat in economy class","A first class seat"],answer:2,
   explain:"客戶原本想要 window seat（靠窗），但 economy class（經濟艙）的靠窗座位都滿了，客戶接受了 aisle seat（走道座位）。所以最後是 <strong>economy class 的 aisle seat</strong>。客戶沒有升級到 business class。",
   source:"Part A（Useful Expressions — 機場購票座位）"},

  // ===== 單複數題 36-40 =====
  {id:36,type:"number",stem:"You can only bring two pieces of ___ on the airplane.",options:["luggages","a luggage","luggage","luggage's"],answer:2,
   explain:"⭐⭐⭐ <strong>老師紅色警示考點</strong>：luggage（行李）是<strong>不可數名詞</strong>，永遠用單數形！想表達「幾件行李」要用 <strong>two pieces of luggage</strong> 或 <strong>two bags</strong>。",
   source:"Part A（Useful Expressions — 老師強調點）"},
  {id:37,type:"number",stem:"After a long trip, Tina put all her ___ in the closet.",options:["stuffs","stuff","a stuff","stuffes"],answer:1,
   explain:"<strong>stuff（東西，口語用法）</strong>是<strong>不可數名詞</strong>，沒有複數形！❌ stuffs / a stuff / stuffes 都是錯的。課文：「I'd like to put all my stuff away.」",
   source:"Part A（put away 片語例句）"},
  {id:38,type:"number",stem:"The ___ on this plane is not very tasty.",options:["foods","food","a food","an food"],answer:1,
   explain:"<strong>food（食物）</strong>通常是<strong>不可數名詞</strong>，不加 s。雖然食物有很多種類時可以用 foods，但這裡指「食物總體」用單數。課文：「The food didn't taste very good.」",
   source:"Part A（機場接機對話）"},
  {id:39,type:"number",stem:"\"I don't have any ___ to check in. I'm only bringing this small backpack.\"",options:["bag","bags","baggages","a bag"],answer:1,
   explain:"<strong>any + 可數複數名詞</strong>：any bags（O）／ any bag（X）。baggage（行李）是不可數，不能加 s（baggages 是錯的）。老師補充：bags 是最通用的字。",
   source:"Part A（Useful Expressions — 行李篇）"},
  {id:40,type:"number",stem:"Many ___ in our company come from different countries.",options:["peoples","person","people","a people"],answer:2,
   explain:"<strong>people</strong> 本身就是<strong>複數名詞</strong>（= persons），不能再加 s。❌ peoples（用於「民族」時才加 s）／ person（單數，與 many 不符）。課文：「I'm going to introduce you to some important people here.」",
   source:"Part C（公司參訪對話）"},

  // ===== 動詞時態題 41-50 =====
  {id:41,type:"tense",stem:"\"___ you ever ___ Japanese food before?\"",options:["Have / had","Did / had","Have / have","Are / have"],answer:0,
   explain:"⭐⭐⭐ <strong>必考時態</strong>：現在完成式問句 Have you ever + 過去分詞 (p.p.)? 結構：Have/Has + 主詞 + ever + p.p. + before? have 的過去分詞是 had。",
   source:"Part D（餐廳對話）"},
  {id:42,type:"tense",stem:"A: \"Have you finished your homework yet?\"<br>B: \"No, I ___ .\"",options:["don't","didn't","haven't","wasn't"],answer:2,
   explain:"<strong>現在完成式否定回答</strong>：用 haven't / hasn't。規則：問句用 Have/Has 開頭 → 回答也要用 haven't/hasn't。課文：「No, I haven't.」就是這個用法。",
   source:"Part D（聽力填空 ❶）"},
  {id:43,type:"tense",stem:"The food on the plane ___ taste very good last night.",options:["doesn't","isn't","didn't","wasn't"],answer:2,
   explain:"<strong>過去式否定句</strong>：didn't + 原形動詞。從「last night」可判斷是過去式。❌ didn't tasted（錯，didn't 後動詞要回原形）。",
   source:"Part A（機場接機對話）"},
  {id:44,type:"tense",stem:"I was so tired that I ___ for ten hours last night.",options:["sleep","sleeping","sleeps","slept"],answer:3,
   explain:"sleep 的過去式是 <strong>slept</strong>（不規則變化）。三態變化：sleep → slept → slept。從「last night」判斷是過去式。",
   source:"Part A（機場接機對話）"},
  {id:45,type:"tense",stem:"Look! Tonya ___ just ___ at the airport.",options:["has / arrived","is / arrive","was / arriving","did / arrive"],answer:0,
   explain:"<strong>現在完成式</strong>：has/have + 過去分詞 (p.p.)，表示「剛剛發生且影響到現在」。從「just」（剛剛）可判斷是現在完成式。arrive 的 p.p. 是 arrived。",
   source:"Part A（聽力理解）"},
  {id:46,type:"tense",stem:"\"Don't worry. I ___ you with your luggage.\"",options:["help","helped","will help","helping"],answer:2,
   explain:"<strong>未來式</strong>：will + 原形動詞，表「將會……」。從前句「Don't worry」（安慰口吻）可判斷是承諾未來的行為。課文：「I'll help you get the best deal.」",
   source:"Part D（市場購物對話）"},
  {id:47,type:"tense",stem:"\"How ___ you ___ for the room? With cash or credit card?\"",options:["do / pay","did / pay","will / be paying","are / paying"],answer:2,
   explain:"<strong>未來進行式</strong>：will be + V-ing，用於詢問「將會怎麼做」（較禮貌）。課文：「How will you be paying for the room?」這是飯店櫃台的標準用語。",
   source:"Part B（飯店入住對話）"},
  {id:48,type:"tense",stem:"Lisa ___ to her boss in his office for half an hour. She still hasn't come out.",options:["has been talking","talks","talked","is talked"],answer:0,
   explain:"<strong>現在完成進行式</strong>：has/have + been + V-ing，表示「從過去到現在持續進行」。從「still hasn't come out」（仍然沒出來）可判斷動作持續到現在。",
   source:"Part B（Word Bank 例句）"},
  {id:49,type:"tense",stem:"___ to the gym every day ___ me feel healthier.",options:["Going / makes","Going / make","Go / makes","To go / make"],answer:0,
   explain:"⭐ <strong>重要文法</strong>：動名詞當主詞時，動詞用<strong>單數</strong>！Going（動名詞主詞）→ 動詞用 makes（單數）。課文：「Traveling always makes me tired.」",
   source:"Part A（機場接機對話）"},
  {id:50,type:"tense",stem:"You ___ to bring food and drinks into this library.",options:["are not allowed","don't allow","didn't allow","not allowed"],answer:0,
   explain:"<strong>被動式</strong>：be allowed to + V（被允許做……）。否定：be <strong>not</strong> allowed to + V。課文：「you are allowed to bargain for the items there.」從句意可判斷是「規定不允許」。",
   source:"Part D（市場議價對話）"},

  // ===== 文法選擇題 51-60 =====
  {id:51,type:"grammar",stem:"\"Would you mind ___ the door for me? My hands are full.\"",options:["open","to open","opening","opened"],answer:2,
   explain:"⭐⭐⭐ <strong>老師圈起來強調的必考點</strong>：mind + V-ing（介意做某事）！❌ Would you mind to open（錯）⭕ Would you mind <strong>opening</strong>（對）。回答：不介意 → No, not at all.",
   source:"Part A Sequencing 練習（老師圈起強調）"},
  {id:52,type:"grammar",stem:"We are all looking forward to ___ our new English teacher.",options:["meet","meeting","to meet","met"],answer:1,

/* ============ helpers ============ */
function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=.92;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
function fmtPat(t){t=String(t).split('<!--')[0].replace(/[<>]/g,' ');return t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/｜/g,'<br>');}
function esc(s){return (s||'').replace(/"/g,'&quot;');}
function stripTags(s){return s.replace(/<[^>]+>/g,'').replace(/❶|❷|❸|❹/g,'').replace(/\s+/g,' ').trim();}

    return `<div class="wb"><div class="wb-title">📒 ${g.title}</div><div class="vgrid">${cards}</div></div>`;
  }).join('');
}
function phraseHTML(groups){
  return groups.map(g=>{
    const items=g.items.map(p=>`<div class="vcard"><div class="vtop"><span class="vword" style="font-size:15px">${p.p}</span>`+
      `<button class="spk" data-say="${esc(p.p.replace(/[／/].*$/,'').replace(/\(.*?\)/g,'').replace(/\+.*$/,'').trim())}">🔊</button></div>`+
      `<div class="vzh zh">${p.zh}</div><div class="vex">${p.ex}</div></div>`).join('');
    return `<div class="card soft"><h4 style="color:var(--clay);font-size:15px;margin-bottom:8px">${g.title}</h4>`+
      `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:8px">${items}</div></div>`;
  }).join('');
}
function kpHTML(kps){
  return kps.map(([t,tag,h,body])=>`<div class="kp ${t}"><div class="tier">${tag}</div><h4>${h}</h4>${body.startsWith('<ul')?body:`<p>${body}</p>`}</div>`).join('');
}

/* hide-zh + speak + lesson render */
let hidden=false;
function bindPanelEvents(){
  document.querySelectorAll('.zhToggle').forEach(b=>b.addEventListener('click',()=>{hidden=!hidden;applyHide();}));
  const g=document.getElementById('globalZh'); if(g)g.addEventListener('click',()=>{hidden=!hidden;applyHide();});
  applyHide();
}
function applyHide(){
  document.body.classList.toggle('hide-zh',hidden);
  document.querySelectorAll('.zhToggle').forEach(b=>b.textContent=hidden?'顯示中文':'隱藏中文');
  const g=document.getElementById('globalZh'); if(g)g.textContent=hidden?'顯示全部中文':'隱藏全部中文（自我測驗）';
}
document.body.addEventListener('click',e=>{const s=e.target.closest('.spk');if(s)speak(s.dataset.say);});
function goTab(p){const t=document.querySelector('.tab[data-p="'+p+'"]');if(t)t.click();}
document.body.addEventListener('keydown',e=>{const g=e.target.closest('.goal[role="button"]');if(g&&(e.key==='Enter'||e.key===' ')){e.preventDefault();g.click();}});

/* ============ quiz engine ============ */
function bindQuiz(){
  const les=L(),Q=les.quiz.bank,LB=les.quiz.typeLabel,PLAN=les.quiz.examPlan;
  let bankScore=0,bankDone=new Set();
  function optHTML(scope,i,oi,opt){return `<button class="opt" data-q="${i}" data-o="${oi}"><span class="lab">${'ABCD'[oi]}</span><span class="en">${opt}</span></button>`;}
  function renderBank(){
    document.getElementById('bankList').innerHTML=Q.map((q,i)=>
      `<div class="qitem" id="b${i}"><span class="qtype ${q.type}">${LB[q.type]||q.type}</span>
       <div class="qtext"><span class="en">${i+1}. ${q.stem}</span></div>
       ${q.options.map((o,oi)=>optHTML('b',i,oi,o)).join('')}
       <div class="explain"><b>解析：</b>${q.explain||''}</div></div>`).join('');
  }
  const entryEl=document.getElementById('quizEntry'),bankStage=document.getElementById('bankStage'),examStage=document.getElementById('examStage');
  document.getElementById('entryBank').onclick=()=>{entryEl.style.display='none';bankStage.classList.add('active');bankScore=0;bankDone.clear();document.getElementById('bankScore').textContent=0;renderBank();};
  document.getElementById('bankBack').onclick=()=>{bankStage.classList.remove('active');entryEl.style.display='grid';};
  document.getElementById('bankList').onclick=e=>{
    const o=e.target.closest('.opt');if(!o)return;const qi=+o.dataset.q,oi=+o.dataset.o;if(bankDone.has(qi))return;bankDone.add(qi);
    const correct=Q[qi].answer,item=document.getElementById('b'+qi);
    item.querySelectorAll('.opt').forEach(b=>{b.style.pointerEvents='none';if(+b.dataset.o===correct)b.classList.add('correct');});
    if(oi===correct){bankScore++;document.getElementById('bankScore').textContent=bankScore;}else o.classList.add('wrong');
    item.querySelector('.explain').classList.add('show');
  };
  // exam
  let examQs=[],examAns={},examTimer=null,examLeft=900,pendingSubmit=false;
  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
  function pick(){const by={};Q.forEach((q,i)=>{(by[q.type]=by[q.type]||[]).push(i);});let c=[];for(const t in PLAN)c=c.concat(shuffle([...(by[t]||[])]).slice(0,PLAN[t]));return shuffle(c);}
  function renderExam(){document.getElementById('examList').innerHTML=examQs.map((qi,n)=>{const q=Q[qi];
    return `<div class="qitem" id="e${n}"><span class="qtype ${q.type}">${LB[q.type]||q.type}</span>
      <div class="qtext"><span class="en">${n+1}. ${q.stem}</span></div>
      ${q.options.map((o,oi)=>`<button class="opt" data-n="${n}" data-o="${oi}"><span class="lab">${'ABCD'[oi]}</span><span class="en">${o}</span></button>`).join('')}
      <div class="explain"></div></div>`;}).join('');}
  function fmt(s){const m=(s/60)|0,x=s%60;return `${m}:${String(x).padStart(2,'0')}`;}
  function start(){examQs=pick();examAns={};examLeft=900;document.getElementById('examResult').innerHTML='';document.getElementById('examAnswered').textContent=0;document.getElementById('submitExam').style.display='';document.getElementById('submitExam').textContent='交卷批改';document.getElementById('examWarn').textContent='';pendingSubmit=false;renderExam();
    const tEl=document.getElementById('timer');tEl.textContent='15:00';tEl.classList.remove('warn');clearInterval(examTimer);
    examTimer=setInterval(()=>{examLeft--;tEl.textContent=fmt(examLeft);if(examLeft<=60)tEl.classList.add('warn');if(examLeft<=0){clearInterval(examTimer);grade(true);}},1000);}
  document.getElementById('entryExam').onclick=()=>{entryEl.style.display='none';examStage.classList.add('active');start();};
  document.getElementById('examBack').onclick=()=>{clearInterval(examTimer);examStage.classList.remove('active');entryEl.style.display='grid';};
  document.getElementById('examList').onclick=e=>{const o=e.target.closest('.opt');if(!o||document.getElementById('submitExam').style.display==='none')return;
    const n=+o.dataset.n,oi=+o.dataset.o;document.querySelectorAll(`#e${n} .opt`).forEach(b=>b.classList.remove('sel'));o.classList.add('sel');examAns[n]=oi;document.getElementById('examAnswered').textContent=Object.keys(examAns).length;};
  function grade(auto){clearInterval(examTimer);let correct=0;
    examQs.forEach((qi,n)=>{const ans=Q[qi].answer,item=document.getElementById('e'+n);
      item.querySelectorAll('.opt').forEach(b=>{b.style.pointerEvents='none';const o=+b.dataset.o;if(o===ans)b.classList.add('correct');else if(examAns[n]===o)b.classList.add('wrong');});
      if(examAns[n]===ans)correct++;const ex=item.querySelector('.explain');ex.innerHTML=`<b>解析：</b>${Q[qi].explain||''}`;ex.classList.add('show');});
    document.getElementById('submitExam').style.display='none';
    const pct=Math.round(correct/examQs.length*100);let grd,cmt;
    if(pct>=90){grd='優異 Excellent';cmt='幾乎全對，這一課掌握得很穩！';}
    else if(pct>=70){grd='及格 Pass';cmt='大方向沒問題，複習錯題就更扎實。';}
    else if(pct>=50){grd='再加油 Keep going';cmt='建議重看文法與重點複習再考一次。';}
    else{grd='需重讀 Review';cmt='先把單字與對話看熟，再回來挑戰。';}
    document.getElementById('examResult').innerHTML=`<div class="result"><div class="score">${correct}/${examQs.length}</div><div class="grade" style="color:${pct>=70?'var(--green)':'var(--clay)'}">${grd}${auto?'（時間到自動交卷）':''}</div><div class="cmt">答對率 ${pct}% · ${cmt}</div><button class="btn" style="margin-top:14px" onclick="document.getElementById('entryExam').click()">再考一次</button></div>`;
    document.getElementById('examResult').scrollIntoView({behavior:'smooth'});}
  document.getElementById('submitExam').onclick=()=>{const un=examQs.length-Object.keys(examAns).length;
    if(un>0&&!pendingSubmit){pendingSubmit=true;document.getElementById('examWarn').textContent=`還有 ${un} 題未作答 — 再按一次「確定交卷」即可批改。`;document.getElementById('submitExam').textContent='確定交卷';return;}
    document.getElementById('examWarn').textContent='';grade(false);};
}

/* ============ final exam (combined pool) ============ */
function renderFinal(){
  document.documentElement.style.setProperty('--accent','#6A3FD6');
  document.documentElement.style.setProperty('--accent-deep','#482799');
  document.getElementById('lessonHead').innerHTML=
    `<div class="kicker">Practical English · 期末驗收</div>
     <h1 class="title"><span class="lno">Final Exam</span>期末考模擬試題</h1>
     <p class="subtitle">從 Lesson 4 ＋ Lesson 5 全部題目中隨機抽 30 題 · 每題 3.33 分</p>`;
  document.getElementById('tabs').innerHTML='';
  const pool=[].concat(LESSONS.l4.quiz.bank.map(q=>({...q,lesson:'L4'}))).concat(LESSONS.l5.quiz.bank.map(q=>({...q,lesson:'L5'})));
  document.getElementById('panels').innerHTML=`<section class="panel active" id="panel-final">
    <div class="sec-head"><span class="sec-no">★</span><h2>期末考模擬 <span class="en-h">Final Exam · 全部 ${pool.length} 題</span></h2></div>
    <div id="finalEntry" class="quiz-entry" style="grid-template-columns:1fr">
      <div class="entry exam" id="entryFinal"><div class="ico">📝</div><h3>開始期末考模擬</h3>
        <p>從 Lesson 4＋5 共 ${pool.length} 題中隨機抽 30 題，作答完一次批改＋逐題詳解。</p>
        <div class="meta">30 題 · 每題 3.33 分 · 25 分鐘 · 滿分約 100 分（60 分及格）</div></div></div>
    <div class="quiz-stage" id="finalStage">
      <div class="qbar"><span class="prog">期末考 · <span id="finalAnswered">0</span> / 30</span><span class="timer" id="finalTimer">25:00</span></div>
      <div id="finalList"></div>
      <div style="text-align:center;margin:18px 0"><button class="btn" id="submitFinal">交卷批改</button><button class="btn ghost" id="finalBack" style="margin-left:8px">放棄返回</button></div>
      <div id="finalWarn" style="text-align:center;color:var(--red);font-size:13px;margin:-8px 0 10px;font-weight:700"></div>
      <div id="finalResult"></div></div></section>`;
  bindFinal(pool);
}
function bindFinal(pool){
  const lab=Object.assign({},LESSONS.l4.quiz.typeLabel,LESSONS.l5.quiz.typeLabel);
  const N=30,PER=3.33,SECS=1500;
  let qs=[],ans={},timer=null,left=SECS,pending=false;
  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
  function pick(){return shuffle(pool.map((_,i)=>i)).slice(0,N);}
  function fmt(s){const m=(s/60)|0,x=s%60;return `${m}:${String(x).padStart(2,'0')}`;}
  function render(){document.getElementById('finalList').innerHTML=qs.map((qi,n)=>{const q=pool[qi];
    return `<div class="qitem" id="f${n}"><span class="qtype ${q.type}">${lab[q.type]||q.type}</span><span class="lesson-badge ${q.lesson}">${q.lesson}</span>
      <div class="qtext"><span class="en">${n+1}. ${q.stem}</span></div>
      ${q.options.map((o,oi)=>`<button class="opt" data-n="${n}" data-o="${oi}"><span class="lab">${'ABCD'[oi]}</span><span class="en">${o}</span></button>`).join('')}
      <div class="explain"></div></div>`;}).join('');}
  const entry=document.getElementById('finalEntry'),stage=document.getElementById('finalStage');
  function start(){qs=pick();ans={};left=SECS;pending=false;
    document.getElementById('finalResult').innerHTML='';document.getElementById('finalAnswered').textContent=0;
    document.getElementById('submitFinal').style.display='';document.getElementById('submitFinal').textContent='交卷批改';document.getElementById('finalWarn').textContent='';
    render();const tEl=document.getElementById('finalTimer');tEl.textContent='25:00';tEl.classList.remove('warn');clearInterval(timer);
    timer=setInterval(()=>{left--;tEl.textContent=fmt(left);if(left<=60)tEl.classList.add('warn');if(left<=0){clearInterval(timer);grade(true);}},1000);}
  document.getElementById('entryFinal').onclick=()=>{entry.style.display='none';stage.classList.add('active');start();};
  document.getElementById('finalBack').onclick=()=>{clearInterval(timer);stage.classList.remove('active');entry.style.display='grid';};
  document.getElementById('finalList').onclick=e=>{const o=e.target.closest('.opt');if(!o||document.getElementById('submitFinal').style.display==='none')return;
    const n=+o.dataset.n,oi=+o.dataset.o;document.querySelectorAll(`#f${n} .opt`).forEach(b=>b.classList.remove('sel'));o.classList.add('sel');ans[n]=oi;document.getElementById('finalAnswered').textContent=Object.keys(ans).length;};
  function grade(auto){clearInterval(timer);let correct=0;
    qs.forEach((qi,n)=>{const a=pool[qi].answer,item=document.getElementById('f'+n);
      item.querySelectorAll('.opt').forEach(b=>{b.style.pointerEvents='none';const o=+b.dataset.o;if(o===a)b.classList.add('correct');else if(ans[n]===o)b.classList.add('wrong');});
      if(ans[n]===a)correct++;const ex=item.querySelector('.explain');ex.innerHTML=`<b>解析：</b>${pool[qi].explain||''}`;ex.classList.add('show');});
    document.getElementById('submitFinal').style.display='none';
    const pts=Math.round(correct*PER*10)/10;let grd,cmt;
    if(pts>=90){grd='優異 Excellent';cmt='兩課都掌握得很扎實！';}
    else if(pts>=60){grd='及格 Pass';cmt='已達 60 分及格，回頭複習錯題再衝高分。';}
    else if(pts>=40){grd='再加油 Keep going';cmt='建議回兩課的「重點複習」與題庫再練幾輪。';}
    else{grd='需重讀 Review';cmt='先把單字與對話讀熟，再回來挑戰。';}
    document.getElementById('finalResult').innerHTML=`<div class="result"><div class="score">${pts}<span style="font-size:.38em"> 分</span></div><div class="grade" style="color:${pts>=60?'var(--green)':'var(--clay)'}">${grd}${auto?'（時間到自動交卷）':''}</div><div class="cmt">答對 ${correct} / ${N} 題 · 每題 ${PER} 分</div><button class="btn" style="margin-top:14px" id="finalRetry">再考一次</button></div>`;
    document.getElementById('finalRetry').onclick=()=>document.getElementById('entryFinal').click();
    document.getElementById('finalResult').scrollIntoView({behavior:'smooth'});}
  document.getElementById('submitFinal').onclick=()=>{const un=N-Object.keys(ans).length;
    if(un>0&&!pending){pending=true;document.getElementById('finalWarn').textContent=`還有 ${un} 題未作答 — 再按一次「確定交卷」即可批改。`;document.getElementById('submitFinal').textContent='確定交卷';return;}
    document.getElementById('finalWarn').textContent='';grade(false);};
}

/* ============ lesson switch ============ */
function renderLesson(){setAccent(L());renderHead();renderTabs();renderPanels();window.scrollTo({top:0});}
document.querySelectorAll('.ls-btn').forEach(b=>b.addEventListener('click',()=>{
  if(b.dataset.lesson===CUR)return;CUR=b.dataset.lesson;
  document.querySelectorAll('.ls-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');
  hidden=false;
  if(CUR==='final')renderFinal();else renderLesson();
}));
renderLesson();
